<div class="layout-container">
  <aside class="sidebar" [class.closed]="!sidebarAbierto">
    <div class="sidebar-header">
      <h1 class="logo">SGP</h1>
      <button class="btn-toggle-sidebar" (click)="toggleSidebar()" type="button">
        <span>{{ sidebarAbierto ? '✕' : '≡' }}</span>
      </button>
    </div>

    <nav class="sidebar-nav">
      <ul>
        <li>
          <a routerLink="/proyectos" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <span class="icon">📋</span>
            <span class="label" *ngIf="sidebarAbierto">Proyectos</span>
          </a>
        </li>
        <li>
          <a routerLink="/clientes" routerLinkActive="active">
            <span class="icon">👥</span>
            <span class="label" *ngIf="sidebarAbierto">Clientes</span>
          </a>
        </li>
        <li>
          <a routerLink="/estadisticas" routerLinkActive="active">
            <span class="icon">📊</span>
            <span class="label" *ngIf="sidebarAbierto">Estadísticas</span>
          </a>
        </li>
        <li>
          <a routerLink="/tareas" routerLinkActive="active">
            <span class="icon">☑️</span>
            <span class="label" *ngIf="sidebarAbierto">Tareas</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer" *ngIf="sidebarAbierto">
      <button (click)="cerrarSesion()" class="btn btn-logout" type="button">
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <div class="main-layout">
    
    <header class="header">
      <div class="header-left">
        <button class="btn-menu" (click)="toggleSidebar()" type="button">
          <span>☰</span>
        </button>
        <h2 class="header-title">Sistema de Gestión de Proyectos</h2>
      </div>

      <div class="header-right">
        <div class="user-info" (click)="toggleMenu($event)">
          <div class="avatar">{{ inicialUsuario }}</div>
          <div class="user-details">
            <span class="user-name">{{ nombreUsuario }}</span>
            <span class="user-status">Conectado</span>
          </div>
        </div>

        <button 
          class="btn-user-menu" 
          (click)="toggleMenu($event)"
          type="button">
          <span>▼</span>
        </button>

        <nav class="user-menu" [class.active]="menuAbierto">
          <a routerLink="/perfil" (click)="menuAbierto = false">
            Mi Perfil
          </a>
          <hr>
          <button 
            (click)="cerrarSesion()" 
            class="btn-logout-menu"
            type="button">
            Cerrar Sesión
          </button>
        </nav>
      </div>
    </header>

    <main class="main-content" [class.sidebar-closed]="!sidebarAbierto">
      <router-outlet></router-outlet>
    </main>

  </div> 
</div>
