<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Gestión de Proyectos</mat-card-title>
      <mat-card-subtitle>Ingresá tus credenciales</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario</mat-label>
          <input matInput formControlName="nombre" placeholder="Ej. usuario" required>
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="loginForm.get('nombre')?.invalid">
            El nombre es obligatorio
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Clave</mat-label>
          <input matInput [type]="hide ? 'password' : 'text'" formControlName="clave" required>
          <button mat-icon-button matSuffix (click)="hide = !hide" type="button" aria-label="Cambiar visibilidad de contraseña">
            <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('clave')?.invalid">
            La clave es obligatoria
          </mat-error>
        </mat-form-field>

        <button mat-raised-button 
                color="primary" 
                class="full-width login-button" 
                type="submit"
                [disabled]="loginForm.invalid">
          ENTRAR
        </button>
        
      </form>
    </mat-card-content>
  </mat-card>
</div>
