<h2 mat-dialog-title>{{ isEditing ? 'Editar Proyecto' : 'Nuevo Proyecto' }}</h2>

<mat-dialog-content [formGroup]="projectForm">
  <div style="display: flex; flex-direction: column; gap: 15px; padding-top: 10px;">
    
    <!-- Campo: Nombre del Proyecto -->
    <mat-form-field appearance="outline">
      <mat-label>Nombre del Proyecto</mat-label>
      <input matInput formControlName="nombre" placeholder="Ej: Sistema Contable" required>
      <mat-error *ngIf="projectForm.get('nombre')?.invalid">
        El nombre es obligatorio
      </mat-error>
    </mat-form-field>

    <!-- Campo: Cliente -->
    <mat-form-field appearance="outline">
      <mat-label>Cliente (Opcional)</mat-label>
      <mat-select formControlName="idCliente">
        <mat-option [value]="null">-- Sin cliente (Interno) --</mat-option>
        <mat-option *ngFor="let c of clientes" [value]="c.id">
          {{c.nombre}}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Campo: Estado (solo visible en edición) -->
    <mat-form-field appearance="outline" *ngIf="isEditing">
      <mat-label>Estado</mat-label>
      <mat-select formControlName="estado">
        <mat-option value="ACTIVO">Activo</mat-option>
        <mat-option value="FINALIZADO">Finalizado</mat-option>
        <mat-option value="BAJA">Baja</mat-option>
      </mat-select>
    </mat-form-field>

  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">CANCELAR</button>
  <button mat-raised-button 
          color="primary" 
          (click)="guardar()" 
          [disabled]="projectForm.invalid">
    GUARDAR
  </button>
</mat-dialog-actions>
