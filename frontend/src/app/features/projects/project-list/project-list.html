<div class="container">
  <div class="header">
    <h1>Gestión de Proyectos</h1>
    <button mat-raised-button color="primary" (click)="abrirFormulario()">
      <mat-icon>add</mat-icon> NUEVO PROYECTO
    </button>
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="proyectos" class="full-width">

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef> Nombre del Proyecto </th>
        <td mat-cell *mat-cell="let p"> {{p.nombre}} </td>
      </ng-container>

      <ng-container matColumnDef="cliente">
        <th mat-header-cell *matHeaderCellDef> Cliente </th>
        <td mat-cell *mat-cell="let p"> {{p.cliente?.nombre || 'Interno'}} </td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef> Estado </th>
        <td mat-cell *mat-cell="let p">
          <mat-chip-set>
            <mat-chip [color]="getEstadoColor(p.estado)" selected>
              {{p.estado}}
            </mat-chip>
          </mat-chip-set>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *mat-cell="let p">
          <button mat-icon-button color="primary" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" title="Dar de baja">
            <mat-icon>delete_outline</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4" style="padding: 20px; text-align: center;">
          No hay proyectos registrados para mostrar.
        </td>
      </tr>
      
    </table>
  </mat-card>
</div>
